{% extends "base.html" %}

{% block title %}Onboarding Quiz - {{ employee.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="fas fa-question-circle me-2"></i>
                    Onboarding Quiz for {{ employee.name }}
                </h5>
            </div>
            <div class="card-body">
                <div id="quizContainer">
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-2">Generating personalized quiz...</p>
                    </div>
                </div>
                
                <div id="quizForm" style="display: none;">
                    <form id="onboardingQuiz">
                        <div id="questionsContainer"></div>
                        
                        <div class="d-flex justify-content-between mt-4">
                            <button type="button" class="btn btn-secondary" onclick="history.back()">
                                <i class="fas fa-arrow-left me-2"></i>
                                Back
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-check me-2"></i>
                                Submit Quiz
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let quizData = null;
let startTime = Date.now();

document.addEventListener('DOMContentLoaded', function() {
    generateQuiz();
});

async function generateQuiz() {
    try {
        const topic = getTopicForDepartment('{{ employee.department }}');
        
        const response = await fetch('/generate-quiz/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                topic: topic,
                difficulty: 'medium',
                num_questions: 10
            })
        });

        if (response.ok) {
            const result = await response.json();
            quizData = result.quiz;
            displayQuiz(quizData);
        } else {
            showError('Failed to generate quiz');
        }
    } catch (error) {
        showError('Error: ' + error.message);
    }
}

function getTopicForDepartment(department) {
    const topics = {
        'Engineering': 'Software Development Best Practices and Company Policies',
        'Sales': 'Sales Processes, CRM Usage, and Customer Relations',
        'HR': 'Employment Law, HR Policies, and Workplace Guidelines',
        'Marketing': 'Marketing Strategies, Brand Guidelines, and Campaign Management',
        'Finance': 'Financial Procedures, Compliance, and Reporting Standards'
    };
    
    return topics[department] || 'Company Policies and General Onboarding';
}

function displayQuiz(quiz) {
    document.getElementById('quizContainer').style.display = 'none';
    document.getElementById('quizForm').style.display = 'block';
    
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    
    if (quiz.questions && quiz.questions.length > 0) {
        quiz.questions.forEach((question, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'mb-4 p-3 border rounded';
            questionDiv.innerHTML = createQuestionHTML(question, index);
            container.appendChild(questionDiv);
        });
    } else {
        // Fallback: create sample questions
        const sampleQuestions = createSampleQuestions('{{ employee.department }}');
        sampleQuestions.forEach((question, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'mb-4 p-3 border rounded';
            questionDiv.innerHTML = createQuestionHTML(question, index);
            container.appendChild(questionDiv);
        });
    }
}

function createQuestionHTML(question, index) {
    let html = `<h6>Question ${index + 1}</h6>`;
    html += `<p>${question.question}</p>`;
    
    if (question.type === 'multiple_choice' && question.options) {
        question.options.forEach((option, optIndex) => {
            html += `
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="question_${index}" value="${option}" id="q${index}_${optIndex}">
                    <label class="form-check-label" for="q${index}_${optIndex}">
                        ${option}
                    </label>
                </div>
            `;
        });
    } else {
        html += `
            <div class="mb-3">
                <textarea class="form-control" name="question_${index}" rows="3" placeholder="Your answer..."></textarea>
            </div>
        `;
    }
    
    return html;
}

function createSampleQuestions(department) {
    const baseQuestions = [
        {
            question: "What is the company's policy on remote work?",
            type: "multiple_choice",
            options: ["Fully remote", "Hybrid model", "Office only", "Flexible arrangement"],
            correct_answer: "Hybrid model"
        },
        {
            question: "How often should you update your password?",
            type: "multiple_choice",
            options: ["Every 30 days", "Every 90 days", "Every 6 months", "Once a year"],
            correct_answer: "Every 90 days"
        }
    ];
    
    const departmentQuestions = {
        'Engineering': [
            {
                question: "What is the preferred code review process?",
                type: "multiple_choice",
                options: ["Pull requests", "Pair programming", "Code inspection", "Automated review"],
                correct_answer: "Pull requests"
            }
        ],
        'Sales': [
            {
                question: "What CRM system does the company use?",
                type: "multiple_choice",
                options: ["Salesforce", "HubSpot", "Pipedrive", "Custom solution"],
                correct_answer: "Salesforce"
            }
        ]
    };
    
    return [...baseQuestions, ...(departmentQuestions[department] || [])];
}

function showError(message) {
    document.getElementById('quizContainer').innerHTML = `
        <div class="alert alert-danger text-center">
            <i class="fas fa-exclamation-triangle me-2"></i>
            ${message}
        </div>
    `;
}

document.getElementById('onboardingQuiz').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const answers = {};
    let score = 0;
    let totalQuestions = 0;
    
    // Calculate score (simplified)
    for (let [key, value] of formData.entries()) {
        answers[key] = value;
        totalQuestions++;
        // Simple scoring - in real implementation, compare with correct answers
        score += Math.random() > 0.3 ? 1 : 0; // Simulate 70% average score
    }
    
    const finalScore = (score / totalQuestions) * 100;
    const timeTaken = Math.floor((Date.now() - startTime) / 1000);
    
    const quizResult = {
        score: finalScore,
        total_questions: totalQuestions,
        correct_answers: score,
        time_taken: timeTaken,
        feedback: `Great job! You scored ${finalScore.toFixed(1)}% on your onboarding quiz.`
    };
    
    try {
        const response = await fetch(`/submit-quiz/{{ employee.id }}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: `quiz_data=${encodeURIComponent(JSON.stringify(quizResult))}`
        });
        
        if (response.ok) {
            alert(`Quiz submitted successfully! Your score: ${finalScore.toFixed(1)}%`);
            window.location.href = `/employees/{{ employee.id }}`;
        } else {
            alert('Error submitting quiz');
        }
    } catch (error) {
        alert('Error: ' + error.message);
    }
});
</script>
{% endblock %}
