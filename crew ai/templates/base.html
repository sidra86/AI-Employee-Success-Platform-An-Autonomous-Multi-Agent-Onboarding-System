<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Adaptive AI Employee Success Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-1: #0f766e;
            --brand-2: #134e4a;
            --accent: #f59e0b;
        }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(160deg, var(--brand-2) 0%, var(--brand-1) 55%, #115e59 100%);
        }
        .main-content {
            background: radial-gradient(circle at top right, #ecfdf5 0%, #f8fafc 45%, #f1f5f9 100%);
            min-height: 100vh;
        }
        .card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(15, 118, 110, 0.08);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
            border: none;
        }
        .brand-badge {
            background: rgba(245, 158, 11, 0.15);
            color: #92400e;
            border-radius: 999px;
            padding: 0.2rem 0.7rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .timeline-item {
            border-left: 3px solid var(--brand-1);
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        .nav-link.active-nav {
            background: rgba(255,255,255,0.12);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 sidebar text-white p-3">
                <div class="d-flex align-items-center mb-2">
                    <i class="fas fa-brain fa-2x me-2"></i>
                    <div>
                        <h5 class="mb-0">AetherSuccess</h5>
                        <small class="opacity-75">Adaptive AI Mentor</small>
                    </div>
                </div>
                <span class="brand-badge mb-4 d-inline-block">Employee Success Platform</span>

                <nav class="nav flex-column gap-1">
                    <a class="nav-link text-white" href="/">
                        <i class="fas fa-home me-2"></i>Home
                    </a>
                    <a class="nav-link text-white" href="/dashboard">
                        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                    </a>
                    <a class="nav-link text-white" href="/insights">
                        <i class="fas fa-chart-line me-2"></i>Manager Insights
                    </a>
                    <a class="nav-link text-white" href="/knowledge">
                        <i class="fas fa-book me-2"></i>Knowledge Base
                    </a>
                    <a class="nav-link text-white" href="#" onclick="showAddEmployeeModal()">
                        <i class="fas fa-user-plus me-2"></i>Add Employee
                    </a>
                </nav>
            </div>

            <div class="col-md-9 col-lg-10 main-content p-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <div class="modal fade" id="addEmployeeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Employee</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addEmployeeForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="department" class="form-label">Department</label>
                            <select class="form-control" id="department" required>
                                <option value="">Select Department</option>
                                <option value="Engineering">Engineering</option>
                                <option value="Sales">Sales</option>
                                <option value="HR">HR</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Finance">Finance</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="position" class="form-label">Position</label>
                            <input type="text" class="form-control" id="position" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addEmployee()">Add Employee</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showAddEmployeeModal() {
            new bootstrap.Modal(document.getElementById('addEmployeeModal')).show();
        }

        async function addEmployee() {
            const employeeData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                department: document.getElementById('department').value,
                position: document.getElementById('position').value
            };

            try {
                const response = await fetch('/employees/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(employeeData)
                });
                if (response.ok) location.reload();
                else alert('Error adding employee');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
